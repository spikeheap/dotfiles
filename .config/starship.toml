# Starship prompt ÔÇö replaces oh-my-zsh's robbyrussell theme (the original is
# captured as a comment in ~/.zshrc). Two-line layout: context on top, a clean
# Ô×ť input line below so the cursor never shifts with path length. Nerd Font
# symbols (https://starship.rs/presets/nerd-font) + Catppuccin Mocha palette.
# Requires a Nerd Font selected in the terminal (FiraCode, via the Brewfile).

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
palette = "catppuccin_mocha"

format = "$directory$git_branch$git_state$git_status$git_metrics$cmd_duration$line_break$character"
right_format = "$nodejs$ruby$python"

# robbyrussell's arrow, now on its own line: green on success, red on failure.
[character]
success_symbol = "[Ô×ť](bold green)"
error_symbol = "[Ô×ť](bold red)"

[directory]
style = "blue"
format = "[$path]($style)[$read_only](red) "
read_only = " ˇ░îż"
truncation_length = 3
truncate_to_repo = false

[git_branch]
symbol = "´Éś "
style = "mauve"
format = "[$symbol$branch]($style) "

[git_status]
style = "red"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "ÔťŚ "
modified = "ÔťŚ "
untracked = "? "
stashed = "Ôëí "
staged = "+ "
ahead = "Ôçí${count} "
behind = "Ôçú${count} "

# Shown automatically mid-operation (rebase, merge, cherry-pick, ÔÇŽ).
[git_state]
style = "peach"
format = "[$state( $progress_current/$progress_total)]($style) "

# +added / -deleted line counts for the working tree (runs `git diff`).
[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

# Duration of the last command, for anything that ran Ôëą2s.
[cmd_duration]
min_time = 2_000
format = "[Ôć│ $duration]($style) "
style = "yellow"

# Right-hand language versions (resolved by mise), shown only in a matching
# project. Symbols from the Nerd Font Symbols preset.
[nodejs]
symbol = "ţťś "
format = "[$symbol($version )]($style)"
style = "green"

[ruby]
symbol = "ţ×Ĺ "
format = "[$symbol($version )]($style)"
style = "red"

[python]
symbol = "ţłÁ "
format = "[$symbol($version )]($style)"
style = "yellow"

# Catppuccin Mocha ÔÇö https://github.com/catppuccin/starship
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
